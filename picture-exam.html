<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oliver's Picture Exam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:#f5f5f5;min-height:100vh}

  /* Exam paper look */
  .exam-paper{max-width:820px;margin:0 auto;background:#fff;min-height:100vh;padding:30px 35px;box-shadow:0 0 30px rgba(0,0,0,.08);position:relative}
  .exam-paper::before{content:'';position:absolute;left:60px;top:0;bottom:0;width:2px;background:#f0c0c0;opacity:.5}

  /* Header */
  .exam-header{text-align:center;border:3px solid #333;padding:16px;margin-bottom:25px;position:relative}
  .exam-header h1{font-size:1.3em;letter-spacing:2px;margin-bottom:4px}
  .exam-header h2{font-size:1.05em;font-weight:600;color:#555}
  .exam-header .subtitle{font-size:.85em;color:#888;margin-top:6px}
  .exam-header .logo{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:2.2em}
  .student-info{display:flex;gap:20px;margin-top:10px;justify-content:center;font-size:.9em;color:#666}
  .student-info span{border-bottom:1px solid #999;padding:2px 20px}

  /* Score area */
  .score-area{position:fixed;top:0;right:0;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:12px 20px;border-radius:0 0 0 16px;font-weight:800;z-index:100;box-shadow:0 4px 15px rgba(0,0,0,.2)}

  /* Part header */
  .part{margin:28px 0 18px;page-break-inside:avoid}
  .part-header{display:flex;align-items:baseline;gap:8px;margin-bottom:14px;border-bottom:2px solid #333;padding-bottom:6px}
  .part-letter{font-size:1.15em;font-weight:900;color:#333}
  .part-title{font-size:1em;font-weight:700;color:#333}
  .part-points{font-size:.8em;color:#888;margin-left:auto}

  /* Scene container */
  .scene{width:100%;border:2px solid #ddd;border-radius:12px;background:#fafafa;position:relative;overflow:hidden;margin:12px 0}
  .scene-room{height:320px;position:relative;background:linear-gradient(180deg,#E3F2FD 0%,#E3F2FD 55%,#EFEBE9 55%,#EFEBE9 100%)}
  .scene-outdoor{height:280px;position:relative;background:linear-gradient(180deg,#B3E5FC 0%,#B3E5FC 50%,#C8E6C9 50%,#C8E6C9 100%)}

  /* Room furniture (CSS drawn) */
  .furniture{position:absolute;display:flex;align-items:center;justify-content:center}
  .table-obj{width:140px;height:8px;background:#8D6E63;border-radius:3px;position:absolute}
  .table-leg{width:8px;height:45px;background:#6D4C41;position:absolute}
  .sofa-obj{width:160px;height:60px;background:#7E57C2;border-radius:10px 10px 4px 4px;position:absolute}
  .sofa-back{width:160px;height:25px;background:#5E35B1;border-radius:10px 10px 0 0;position:absolute}
  .bed-obj{width:150px;height:50px;background:#EF9A9A;border-radius:6px;position:absolute}
  .bed-pillow{width:35px;height:20px;background:#fff;border-radius:5px;position:absolute;border:1px solid #eee}
  .shelf-obj{width:120px;height:8px;background:#8D6E63;position:absolute}
  .door-obj{width:55px;height:100px;background:#A1887F;border-radius:4px 4px 0 0;position:absolute;border:2px solid #795548}
  .door-knob{width:8px;height:8px;background:#FFD54F;border-radius:50%;position:absolute}
  .window-obj{width:70px;height:60px;background:#B3E5FC;border:3px solid #8D6E63;position:absolute;border-radius:4px}
  .window-cross-h{width:64px;height:3px;background:#8D6E63;position:absolute}
  .window-cross-v{width:3px;height:54px;background:#8D6E63;position:absolute}

  /* Scene items (emoji overlays) */
  .scene-item{position:absolute;font-size:2em;transition:all .3s;z-index:10;filter:drop-shadow(1px 2px 2px rgba(0,0,0,.15))}
  .scene-item.numbered{cursor:default}
  .scene-item .num{position:absolute;top:-8px;right:-10px;background:#FF6B6B;color:#fff;width:22px;height:22px;border-radius:50%;font-size:.45em;display:flex;align-items:center;justify-content:center;font-weight:900;box-shadow:0 2px 5px rgba(0,0,0,.2)}

  /* Action scene items for present continuous */
  .action-scene{height:180px;position:relative;background:linear-gradient(180deg,#E8F5E9 0%,#E8F5E9 65%,#A5D6A7 65%)}
  .action-emoji{font-size:3.5em;position:absolute;left:50%;top:45%;transform:translate(-50%,-50%)}
  .action-label{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;padding:4px 14px;border-radius:20px;font-size:.8em;font-weight:700}

  /* Question rows */
  .q-row{display:flex;align-items:flex-start;gap:10px;margin:12px 0;padding:10px 12px;border-radius:10px;transition:background .3s}
  .q-row:hover{background:#f9f9f9}
  .q-num{min-width:28px;height:28px;background:#667eea;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85em;font-weight:800;flex-shrink:0;margin-top:2px}
  .q-content{flex:1}
  .q-sentence{font-size:1.02em;font-weight:600;line-height:1.6;margin-bottom:8px}
  .q-blank{display:inline-block;min-width:90px;border-bottom:2px solid #667eea;text-align:center;font-weight:800;color:#5B4FBE;margin:0 3px;padding:2px 8px;cursor:pointer;transition:all .2s}
  .q-blank:hover{background:#f0eeff}
  .q-blank.filled{border-color:#4ECDC4;color:#00897B;background:#E0FFF8}
  .q-blank.wrong-fill{border-color:#FF6B6B;color:#C62828;background:#FFF0F0}

  /* Choice boxes */
  .choice-box{display:inline-flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .choice-pill{padding:6px 14px;border:2px solid #ddd;border-radius:20px;font-size:.9em;font-weight:700;cursor:pointer;transition:all .2s;background:#fff;user-select:none}
  .choice-pill:hover{border-color:#667eea;background:#f5f3ff}
  .choice-pill.selected{border-color:#667eea;background:#E8E4FF;color:#5B4FBE}
  .choice-pill.correct{border-color:#4ECDC4;background:#E0FFF8;color:#00897B}
  .choice-pill.wrong{border-color:#FF6B6B;background:#FFF0F0;color:#C62828}
  .choice-pill.disabled{pointer-events:none;opacity:.6}

  /* O/X buttons */
  .ox-buttons{display:inline-flex;gap:8px}
  .ox-btn{width:40px;height:40px;border-radius:50%;border:3px solid #ddd;font-size:1.1em;font-weight:900;cursor:pointer;transition:all .2s;background:#fff;display:flex;align-items:center;justify-content:center}
  .ox-btn:hover{transform:scale(1.1)}
  .ox-btn.o-btn{color:#4ECDC4}
  .ox-btn.x-btn{color:#FF6B6B}
  .ox-btn.selected{transform:scale(1.05)}
  .ox-btn.o-btn.selected{background:#E0FFF8;border-color:#4ECDC4}
  .ox-btn.x-btn.selected{background:#FFF0F0;border-color:#FF6B6B}
  .ox-btn.correct-pick{background:#E0FFF8;border-color:#4ECDC4;box-shadow:0 0 10px rgba(78,205,196,.4)}
  .ox-btn.wrong-pick{background:#FFF0F0;border-color:#FF6B6B;box-shadow:0 0 10px rgba(255,107,107,.4)}

  /* Input blanks */
  .q-input{width:110px;font-size:.95em;padding:4px 10px;border:none;border-bottom:2px solid #667eea;font-family:'Nunito',sans-serif;font-weight:700;text-align:center;outline:none;background:transparent;transition:border-color .3s}
  .q-input:focus{border-color:#764ba2}
  .q-input.correct{border-color:#4ECDC4;color:#00897B}
  .q-input.wrong{border-color:#FF6B6B;color:#C62828}

  /* Picture grid for vocab */
  .pic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin:12px 0}
  .pic-card{border:2px solid #ddd;border-radius:12px;text-align:center;padding:12px 8px;cursor:pointer;transition:all .2s;background:#fff}
  .pic-card:hover{border-color:#667eea;transform:translateY(-2px)}
  .pic-card .pic-emoji{font-size:2.8em;margin-bottom:6px}
  .pic-card .pic-num{background:#667eea;color:#fff;width:22px;height:22px;border-radius:50%;font-size:.75em;font-weight:900;display:inline-flex;align-items:center;justify-content:center;margin-bottom:6px}
  .pic-card .pic-word{font-size:.85em;font-weight:700;color:#555;min-height:20px}
  .pic-card.correct{border-color:#4ECDC4;background:#E0FFF8}
  .pic-card.wrong{border-color:#FF6B6B;background:#FFF0F0}

  /* Word bank */
  .word-bank{background:#FFF8E1;border:2px dashed #FFB74D;border-radius:12px;padding:12px 16px;margin:12px 0;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .bank-word{padding:6px 14px;background:#fff;border:2px solid #FFB74D;border-radius:8px;font-weight:700;font-size:.9em;cursor:pointer;transition:all .2s;user-select:none}
  .bank-word:hover{background:#FFF3E0;transform:scale(1.03)}
  .bank-word.used{opacity:.3;pointer-events:none;text-decoration:line-through}

  /* Submit / Check button */
  .check-row{text-align:center;margin:25px 0;padding-top:15px;border-top:1px dashed #ddd}
  .check-btn{padding:14px 40px;border:none;border-radius:30px;font-family:'Nunito',sans-serif;font-weight:800;font-size:1.1em;cursor:pointer;transition:all .3s;color:#fff;background:linear-gradient(135deg,#667eea,#764ba2);box-shadow:0 5px 20px rgba(102,126,234,.3)}
  .check-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,.4)}
  .check-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

  .result-banner{padding:16px 24px;border-radius:12px;text-align:center;font-weight:800;font-size:1.1em;margin:20px 0;animation:fadeIn .4s}
  .result-banner.good{background:#E0FFF8;color:#00897B;border:2px solid #4ECDC4}
  .result-banner.ok{background:#FFF8E1;color:#F57F17;border:2px solid #FFB74D}
  .result-banner.bad{background:#FFF0F0;color:#C62828;border:2px solid #FF6B6B}

  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes confetti{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(280px) rotate(720deg)}}
  .confetti-piece{position:fixed;width:10px;height:10px;animation:confetti 1.5s ease forwards;z-index:9999;pointer-events:none}

  /* Navigation */
  .exam-nav{display:flex;gap:10px;justify-content:center;margin:20px 0;flex-wrap:wrap}
  .exam-nav-btn{padding:10px 22px;border:2px solid #667eea;border-radius:25px;background:#fff;color:#667eea;font-family:'Nunito',sans-serif;font-weight:700;font-size:.95em;cursor:pointer;transition:all .2s}
  .exam-nav-btn:hover,.exam-nav-btn.active{background:#667eea;color:#fff}

  .home-link{display:block;text-align:center;margin:20px 0;color:#667eea;font-weight:700;text-decoration:none;font-size:.95em}
  .home-link:hover{text-decoration:underline}

  @media(max-width:600px){
    .exam-paper{padding:16px 14px}
    .exam-paper::before{left:30px}
    .scene-room{height:260px}
    .pic-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
    .exam-header .logo{display:none}
  }
</style>
</head>
<body>

<div class="score-area">&#11088; <span id="totalScore">0</span> / <span id="totalMax">0</span></div>

<div class="exam-paper" id="examPaper"></div>

<script>
let totalScore=0, totalMax=0, currentPart='all';
const $=id=>document.getElementById(id);

function updateScore(){$('totalScore').textContent=totalScore;$('totalMax').textContent=totalMax}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function showConfetti(){const c=['#FF6B6B','#4ECDC4','#45B7D1','#FFEAA7','#DDA0DD','#96CEB4','#FF8C42'];for(let i=0;i<30;i++){const e=document.createElement('div');e.className='confetti-piece';e.style.left=Math.random()*100+'vw';e.style.top='-10px';e.style.background=c[Math.floor(Math.random()*c.length)];e.style.borderRadius=Math.random()>.5?'50%':'0';e.style.animationDelay=Math.random()*.5+'s';document.body.appendChild(e);setTimeout(()=>e.remove(),2000)}}

const oxQuestions = [

const pcPictures = [

// Part D: Look at the picture, match the word (vocabulary)
const vocabPics = [
  {emoji:'🔧',word:'wrench'},{emoji:'🪚',word:'saw'},{emoji:'🪖',word:'helmet'},
  {emoji:'🧹',word:'broom'},{emoji:'👑',word:'crown'},{emoji:'🪢',word:'rope'},

          <div class="scene-item numbered" style="left:48%;top:67%;font-size:1.8em">🐱<div class="num">1</div></div>
          <div class="scene-item numbered" style="left:16%;top:26%;font-size:1.4em">📚<div class="num">2</div></div>
          <div class="scene-item numbered" style="left:72%;top:14%;font-size:1.5em">🖼️<div class="num">3</div></div>
          <div class="scene-item numbered" style="left:67%;top:36%;font-size:1.3em">💡<div class="num">4</div></div>
          <div class="scene-item numbered" style="right:45px;top:78%;font-size:1.3em">👟<div class="num">5</div></div>
          <div class="scene-item numbered" style="left:28px;top:68%;font-size:1.5em">🐕<div class="num">6</div></div>
        </div>
      </div>

      <div class="word-bank">
        ${prepChoices.map(w=>`<span class="bank-word">${w}</span>`).join('')}
      </div>

      <div id="prepQs">
        ${prepQuestions.map((q,i)=>`
          <div class="q-row" id="prepQ${i}">
            <div class="q-num">${q.num}</div>
            <div class="q-content">
              <div class="q-sentence">${q.item} ${q.sent.replace('___',`<input class="q-input" id="prepA${i}" placeholder="..." data-answer="${q.answer}">`)}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- PART B: O/X with Pictures -->
    <div class="part" id="partB">
      <div class="part-header">
        <span class="part-letter">Part B.</span>
        <span class="part-title">Look at the picture. Write (O) if the sentence is correct, and (X) if it is incorrect.</span>
        <span class="part-points">(${oxQuestions.length * 2} pts)</span>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px">
        ${oxQuestions.map((q,i)=>`
          <div class="q-row" id="oxQ${i}" style="border:2px solid #eee;border-radius:12px;padding:14px;margin:0;flex-direction:column;align-items:center;text-align:center">
            <div style="font-size:3.5em;margin:8px 0">${q.visual}</div>
            <div style="font-size:.8em;color:#999;margin-bottom:6px">(${q.action})</div>
            <div class="q-sentence" style="margin-bottom:10px">${i+1}. ${q.sent}</div>
            <div class="ox-buttons">
              <button class="ox-btn o-btn" data-qi="${i}" data-val="true" onclick="pickOX(${i},true,${q.answer})">O</button>
              <button class="ox-btn x-btn" data-qi="${i}" data-val="false" onclick="pickOX(${i},false,${q.answer})">X</button>
            </div>
            <div id="oxFb${i}" style="font-size:.85em;font-weight:700;margin-top:6px;min-height:20px"></div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- PART C: Present Continuous with Pictures -->
    <div class="part" id="partC">
      <div class="part-header">
        <span class="part-letter">Part C.</span>
        <span class="part-title">Look at the picture. Fill in the blanks with the correct be verb (is, am, are) and the verb form (-ing).</span>
        <span class="part-points">(${8 * 2} pts)</span>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px">
        ${pcPictures.slice(0,8).map((q,i)=>`
          <div class="q-row" id="pcQ${i}" style="border:2px solid #eee;border-radius:12px;padding:14px;margin:0;flex-direction:column;align-items:center;text-align:center">
            <div style="font-size:3.5em;margin:8px 0">${q.emoji}</div>
            <div class="q-sentence">${i+1}. ${q.subj} <input class="q-input" id="pcBe${i}" placeholder="is/am/are" style="width:70px" data-answer="${q.full.split(' ')[1]}"> <input class="q-input" id="pcVerb${i}" placeholder="verb-ing" style="width:100px" data-answer="${q.action.includes(' ')?q.action:q.action+'.'}">.</div>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- PART D: Vocabulary with Pictures -->
    <div class="part" id="partD">
      <div class="part-header">
        <span class="part-letter">Part D.</span>
        <span class="part-title">Look at the picture. Write the correct word from the box.</span>
        <span class="part-points">(${10 * 2} pts)</span>
      </div>

      <div class="word-bank" id="vocabBank">
        ${shuffle(vocabPics.slice(0,10).map(v=>v.word)).map(w=>`<span class="bank-word" onclick="selectBankWord(this)">${w}</span>`).join('')}
      </div>

      <div class="pic-grid">
        ${vocabPics.slice(0,10).map((v,i)=>`
          <div class="pic-card" id="vocabCard${i}">
            <div class="pic-num">${i+1}</div>
            <div class="pic-emoji">${v.emoji}</div>
            <input class="q-input" id="vocabA${i}" placeholder="..." style="width:90%;margin-top:4px" data-answer="${v.word}">
          </div>
        `).join('')}
      </div>
    </div>

    <!-- PART E: Unscramble with Picture Hint -->
    <div class="part" id="partE">
      <div class="part-header">
        <span class="part-letter">Part E.</span>
        <span class="part-title">Look at the picture. Unscramble the sentence.</span>
        <span class="part-points">(${scramblePic.length * 3} pts)</span>
      </div>

      ${scramblePic.map((q,i)=>{
        const shuffled=shuffle(q.words);
        return `
        <div class="q-row" id="scramQ${i}" style="flex-direction:column;border:2px solid #eee;border-radius:12px;padding:16px;margin:10px 0">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
            <div class="q-num">${i+1}</div>
            <div style="font-size:2.2em">${q.pic}</div>
          </div>
          <div class="word-pool" id="scramPool${i}">
            ${shuffled.map((w,j)=>`<span class="word-chip" id="sc${i}_${j}" onclick="scramTap(${i},${j},'${w.replace(/'/g,"\\'")}')">${w}</span>`).join('')}
          </div>
          <div class="drop-zone" id="scramDrop${i}" style="min-height:45px"></div>
          <div style="text-align:right"><button class="choice-pill" onclick="scramReset(${i})" style="font-size:.8em">Reset</button></div>
          <input type="hidden" id="scramA${i}" data-answer="${q.answer}">
        </div>`;
      }).join('')}
    </div>

    <!-- PART F: Reflexive Pronouns with Pictures -->
    <div class="part" id="partF">
      <div class="part-header">
        <span class="part-letter">Part F.</span>
        <span class="part-title">Look at the picture. Complete the sentence with a suitable reflexive pronoun.</span>
        <span class="part-points">(${refPics.length * 2} pts)</span>
      </div>

      <div class="word-bank">
        ${['myself','yourself','himself','herself','itself','ourselves','themselves'].map(w=>`<span class="bank-word">${w}</span>`).join('')}
      </div>

      ${refPics.map((q,i)=>`
        <div class="q-row" id="refQ${i}">
          <div class="q-num">${i+1}</div>
          <div style="font-size:2em;margin-right:8px">${q.emoji}</div>
          <div class="q-content">
            <div class="q-sentence">${q.sent.replace('___',`<input class="q-input" id="refA${i}" placeholder="..." data-answer="${q.answer}">`)}</div>
          </div>
        </div>
      `).join('')}
    </div>

    <!-- SUBMIT -->
    <div class="check-row">
      <button class="check-btn" onclick="gradeExam()">&#9998; Check My Answers</button>
    </div>
    <div id="resultArea"></div>

    <a href="index.html" class="home-link">&#8592; Back to Study Hub</a>
  `;

  // Init scramble data
  for(let i=0;i<scramblePic.length;i++) window['scramData'+i]=[];
}

// =============== INTERACTIONS ===============
// O/X
const oxAnswered=new Set();
function pickOX(qi,val,correct){
  if(oxAnswered.has(qi))return;
  oxAnswered.add(qi);
  const btns=document.querySelectorAll(`[data-qi="${qi}"]`);
  btns.forEach(b=>{
    const bVal=b.dataset.val==='true';
    if(bVal===val) b.classList.add('selected');
    b.style.pointerEvents='none';
  });

  const fb=$('oxFb'+qi);
  if(val===correct){
    const picked=document.querySelector(`[data-qi="${qi}"][data-val="${val}"]`);
    picked.classList.add('correct-pick');
    fb.style.color='#00897B';
    fb.textContent='Correct! ✓';
  } else {
    const picked=document.querySelector(`[data-qi="${qi}"][data-val="${val}"]`);
    picked.classList.add('wrong-pick');
    const right=document.querySelector(`[data-qi="${qi}"][data-val="${correct}"]`);
    right.classList.add('correct-pick');
    fb.style.color='#C62828';
    fb.textContent='✗ The answer is '+(correct?'O':'X');
  }
}

// Scramble
function scramTap(qi,wi,word){
  const chip=$('sc'+qi+'_'+wi);
  if(chip.classList.contains('used'))return;
  chip.classList.add('used');

  if(!window['scramData'+qi])window['scramData'+qi]=[];
  window['scramData'+qi].push({wi,word});

  const el=document.createElement('span');
  el.className='placed';
  el.style.cssText='padding:6px 12px;background:#667eea;border-radius:8px;color:#fff;font-weight:700;font-size:.95em;cursor:pointer;display:inline-block';
  el.textContent=word;
  el.onclick=()=>{
    chip.classList.remove('used');
    window['scramData'+qi]=window['scramData'+qi].filter(d=>d.wi!==wi);
    el.remove();
  };
  $('scramDrop'+qi).appendChild(el);

  // Update hidden input
  $('scramA'+qi).value=window['scramData'+qi].map(d=>d.word).join(' ');
}

function scramReset(qi){
  window['scramData'+qi]=[];
  $('scramDrop'+qi).innerHTML='';
  $('scramA'+qi).value='';
  document.querySelectorAll(`[id^="sc${qi}_"]`).forEach(c=>c.classList.remove('used'));
}

function selectBankWord(el){
  // Simple visual highlight
  document.querySelectorAll('.bank-word').forEach(b=>b.style.background='');
  el.style.background='#FFE082';
}

// =============== GRADING ===============
function gradeExam(){
  totalScore=0;totalMax=0;

  // Grade Part A: Prepositions
  prepQuestions.forEach((q,i)=>{
    totalMax+=2;
    const inp=$('prepA'+i);
    const val=inp.value.trim().toLowerCase();
    if(val===q.answer.toLowerCase()){
      totalScore+=2;inp.classList.add('correct');inp.classList.remove('wrong');
    } else {
      inp.classList.add('wrong');inp.classList.remove('correct');
      inp.value=inp.value||'';
      inp.placeholder=q.answer;
    }
  });

  // Grade Part B: O/X (already graded inline)
  oxQuestions.forEach((q,i)=>{
    totalMax+=2;
    if(oxAnswered.has(i)){
      const picked=document.querySelector(`[data-qi="${i}"].selected`);
      if(picked){
        const pVal=picked.dataset.val==='true';
        if(pVal===q.answer)totalScore+=2;
      }
    }
  });

  // Grade Part C: Present Continuous
  pcPictures.slice(0,8).forEach((q,i)=>{
    totalMax+=2;
    const beInp=$('pcBe'+i);
    const verbInp=$('pcVerb'+i);
    const beAns=q.full.split(' ')[1];
    const actWords=q.action.replace(/\./g,'');
    let pts=0;
    if(beInp.value.trim().toLowerCase()===beAns.toLowerCase()){pts++;beInp.classList.add('correct');beInp.classList.remove('wrong')}
    else{beInp.classList.add('wrong');beInp.placeholder=beAns}
    const vVal=verbInp.value.trim().toLowerCase().replace(/\.$/,'');
    if(vVal===actWords.toLowerCase()){pts++;verbInp.classList.add('correct');verbInp.classList.remove('wrong')}
    else{verbInp.classList.add('wrong');verbInp.placeholder=actWords}
    totalScore+=pts;
  });

  // Grade Part D: Vocabulary
  vocabPics.slice(0,10).forEach((v,i)=>{
    totalMax+=2;
    const inp=$('vocabA'+i);
    if(inp.value.trim().toLowerCase()===v.word.toLowerCase()){
      totalScore+=2;inp.classList.add('correct');inp.classList.remove('wrong');
      $('vocabCard'+i).classList.add('correct');
    } else {
      inp.classList.add('wrong');inp.classList.remove('correct');
      inp.placeholder=v.word;
      $('vocabCard'+i).classList.add('wrong');
    }
  });

  // Grade Part E: Unscramble
  scramblePic.forEach((q,i)=>{
    totalMax+=3;
    const val=($('scramA'+i).value||'').trim();
    const drop=$('scramDrop'+i);
    if(val===q.answer){
      totalScore+=3;drop.style.borderColor='#4ECDC4';drop.style.background='#E0FFF8';
    } else {
      drop.style.borderColor='#FF6B6B';drop.style.background='#FFF0F0';
      const hint=document.createElement('div');
      hint.style.cssText='font-size:.85em;color:#C62828;font-weight:700;margin-top:6px';
      hint.textContent='Answer: '+q.answer;
      drop.parentElement.appendChild(hint);
    }
  });

  // Grade Part F: Reflexive
  refPics.forEach((q,i)=>{
    totalMax+=2;
    const inp=$('refA'+i);
    if(inp.value.trim().toLowerCase()===q.answer.toLowerCase()){
      totalScore+=2;inp.classList.add('correct');inp.classList.remove('wrong');
    } else {
      inp.classList.add('wrong');inp.classList.remove('correct');
      inp.placeholder=q.answer;
    }
  });

  updateScore();

  const pct=Math.round(totalScore/totalMax*100);
  let cls='bad',msg='Keep practicing! Review the wrong answers.';
  if(pct>=85){cls='good';msg='Excellent! You are ready for the exam!';showConfetti()}
  else if(pct>=60){cls='ok';msg='Good job! Review the parts you missed.'}

  $('resultArea').innerHTML=`
    <div class="result-banner ${cls}">
      ${pct>=85?'&#127942;':pct>=60?'&#11088;':'&#128170;'} Score: ${totalScore} / ${totalMax} (${pct}%) &mdash; ${msg}
    </div>`;
  $('resultArea').scrollIntoView({behavior:'smooth'});

  // Disable check button
  document.querySelector('.check-btn').disabled=true;
  document.querySelector('.check-btn').textContent='Graded ✓';
}

function scrollToPart(id){
  document.querySelectorAll('.exam-nav-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  if(id==='all'){window.scrollTo({top:0,behavior:'smooth'});return}
  const el=$(id);
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
}

// =============== INIT ===============
renderExam();
</script>
